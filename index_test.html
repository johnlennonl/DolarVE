<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DolarVE TEST | Finanzas en Tiempo Real</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <section id="home-screen" class="screen active">
            <header>
                <div class="header-title">
                    <span class="header-subtitle">Oficial BCV</span>
                    <h1>Bolívar Digital TEST</h1>
                </div>
            </header>
            <div class="card">
                <div class="card-title">USD / VES</div>
                <div class="card-value"><span id="usd-bcv-price">---</span> VES</div>
                <div class="card-footer">
                    <span id="last-update-usd">Actualizado...</span>
                </div>
            </div>
        </section>

        <!-- Crypto Screen -->
        <section id="crypto-screen" class="screen">
            <header>
                <div class="header-title">
                    <span class="header-subtitle">Prueba</span>
                    <h1>Cripto TEST</h1>
                </div>
            </header>
            <div class="crypto-list">
                <div class="crypto-item">
                    <div class="crypto-info">
                        <div class="crypto-name">
                            <div>TEST TOKEN</div>
                            <div>TEST</div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="settings-screen" class="screen">
            <h1>Ajustes TEST</h1>
            <p>Si ves esto, el archivo funciona.</p>
        </section>

        <nav class="bottom-nav">
            <a href="#" class="nav-item active"><span>Inicio</span></a>
            <a href="#" class="nav-item"><span>Calc</span></a>
            <a href="#" class="nav-item"><span>Cripto</span></a>
            <a href="#" class="nav-item"><span>Ajustes</span></a>
        </nav>
    </div>
    <script src="app_test.js"></script>
</body>
</html>
